<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5e211c">
<meta name="description" content="イタリア・トスカーナ、シエナのレストラン・郷土料理・観光名所ガイド。検索・タグ・地図付き。">
<title>シエナ 美食・観光ガイド</title>
<link rel="stylesheet" href="css/style.css?v=5">
<style>
/* ===== ランディング ===== */
.lp{min-height:100vh;min-height:100dvh;position:relative;display:flex;flex-direction:column;
  color:#fff;overflow:hidden}
.lp-bg{position:absolute;inset:0;z-index:0;
  background:#3a1512 url("images/hero.jpg") center 30% / cover no-repeat}
.lp-bg::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(60,20,15,.55) 0%,rgba(60,20,15,.25) 32%,rgba(50,18,14,.72) 78%,rgba(40,14,10,.92) 100%)}
.lp-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;
  justify-content:flex-end;max-width:900px;margin:0 auto;width:100%;
  padding:0 22px calc(env(safe-area-inset-bottom) + 30px)}
.lp-top{position:relative;z-index:1;display:flex;justify-content:center;
  padding:calc(env(safe-area-inset-top) + 20px) 22px 0}
.lp-kicker{font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;font-weight:700;
  color:var(--accent);text-shadow:0 1px 8px rgba(0,0,0,.6)}
.lp-title{font-size:clamp(2.6rem,13vw,4.6rem);font-weight:800;line-height:1;margin:.2em 0 .1em;
  letter-spacing:.02em;text-shadow:0 3px 24px rgba(0,0,0,.5)}
.lp-sub{font-size:clamp(1rem,4.6vw,1.5rem);font-weight:700;margin:0 0 .5em;
  text-shadow:0 2px 14px rgba(0,0,0,.6)}
.lp-desc{font-size:.92rem;line-height:1.75;max-width:32em;opacity:.94;margin:0 0 1.4em;
  text-shadow:0 1px 10px rgba(0,0,0,.7)}
.lp-stats{display:flex;gap:20px;margin:0 0 1.6em;flex-wrap:wrap}
.lp-stat{display:flex;flex-direction:column;line-height:1.1}
.lp-stat b{font-size:1.7rem;font-weight:800;color:#fff}
.lp-stat span{font-size:.72rem;opacity:.85;letter-spacing:.05em}
.lp-cta{display:inline-flex;align-items:center;gap:10px;align-self:flex-start;
  background:var(--accent);color:#3a2c07;font-weight:800;font-size:1.02rem;
  padding:15px 26px;border-radius:999px;text-decoration:none;
  box-shadow:0 8px 30px rgba(0,0,0,.35);transition:transform .12s,box-shadow .12s}
.lp-cta:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(0,0,0,.45)}
.lp-links{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.lp-link{display:flex;flex-direction:column;align-items:center;gap:6px;
  background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);
  border-radius:14px;padding:14px 6px;text-decoration:none;color:#fff;
  font-size:.78rem;font-weight:700;backdrop-filter:blur(6px);transition:.14s}
.lp-link:hover{background:rgba(255,255,255,.24)}
.lp-link .i{font-size:1.5rem;line-height:1}
.lp-credit{position:relative;z-index:1;text-align:center;font-size:.64rem;opacity:.6;
  padding:10px 22px calc(env(safe-area-inset-bottom) + 8px)}
.lp-credit a{color:inherit}
@media (max-width:520px){
  .lp-links{grid-template-columns:repeat(2,1fr)}
  .lp-stats{gap:16px}
}
@media (min-width:760px){
  .lp-bg{background-position:center 28%}
  .lp-inner{padding-bottom:56px}
}
</style>
</head>
<body>
<main class="lp">
  <div class="lp-bg"></div>
  <div class="lp-top">
    <span class="lp-kicker">Italia · Toscana</span>
  </div>
  <div class="lp-inner">
    <h1 class="lp-title">シエナ</h1>
    <p class="lp-sub">美食・観光ガイド</p>
    <p class="lp-desc">中世の街並みが残るトスカーナの宝石、シエナ。ピチやチンタ・セネーゼ豚の郷土料理から、カンポ広場・大聖堂といった名所まで。レストラン26・郷土料理21・観光名所21を、検索・タグ・地図付きでまとめました。</p>
    <div class="lp-stats">
      <div class="lp-stat"><b>26</b><span>レストラン</span></div>
      <div class="lp-stat"><b>21</b><span>郷土料理</span></div>
      <div class="lp-stat"><b>21</b><span>観光名所</span></div>
    </div>
    <a class="lp-cta" href="guide.html">ガイドを見る<span aria-hidden="true">→</span></a>
    <nav class="lp-links" aria-label="カテゴリー">
      <a class="lp-link" href="guide.html#restaurants"><span class="i">🍽️</span>レストラン</a>
      <a class="lp-link" href="guide.html#foods"><span class="i">🍝</span>食べ物</a>
      <a class="lp-link" href="guide.html#attractions"><span class="i">🏛️</span>観光</a>
      <a class="lp-link" href="guide.html#map"><span class="i">🗺️</span>マップ</a>
    </nav>
  </div>
  <p class="lp-credit">写真: <a href="https://unsplash.com/photos/Qackx5pq2ts" target="_blank" rel="noopener">Unsplash</a> ／ データ: シエナ現地調査ノート 2026</p>
</main>
</body>
</html>
